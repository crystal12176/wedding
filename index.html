<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家在毅綺 - 柏毅 & 儷綺 Wedding Invitation</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --primary-gold: #d4a373;
            --sage-green: #8da399;
            --warm-bg: #fefae0;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #faf9f6;
            color: #4a4a4a;
            scroll-behavior: smooth;
        }

        .font-serif-en {
            font-family: 'Cormorant Garamond', serif;
        }

        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('https://i.postimg.cc/25y9KJHr/IMG-4713-qiang-hua-SR.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        .hero-content {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .timer-card {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            min-width: 80px;
            position: relative;
        }

        .timer-divider {
            width: 1px;
            height: 40px;
            background: #e0e0e0;
            margin: 0 0.8rem;
        }

        .v-card {
            background: white;
            border-left: 4px solid var(--primary-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .form-input {
            border: none;
            border-bottom: 1px solid #d1d1d1;
            padding: 0.5rem 0;
            width: 100%;
            background: transparent;
            transition: border-color 0.3s;
            font-family: 'Noto Serif TC', serif;
        }
        .form-input:focus {
            outline: none;
            border-bottom-color: var(--primary-gold);
        }

        .btn-green {
            background-color: var(--sage-green);
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            transition: all 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            font-size: 0.875rem;
            text-transform: uppercase;
        }
        .btn-green:hover {
            background-color: var(--primary-gold);
            transform: translateY(-2px);
        }

        .hidden-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .show-section {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] p-4 flex justify-center items-center text-[#4a4a4a] bg-white/60 backdrop-blur-md shadow-sm">
        <div class="space-x-8 text-sm tracking-widest font-medium">
            <a href="#about" class="hover:text-[#d4a373] transition">加入好友</a>
            <a href="#details" class="hover:text-[#d4a373] transition">婚宴資訊</a>
            <a href="#rsvp" class="hover:text-[#d4a373] transition">出席回函</a>
        </div>
    </nav>

    <header class="hero-section text-white">
        <div class="hero-content">
            <p class="font-serif-en italic text-xl md:text-2xl mb-2 opacity-90 tracking-[0.3em]">Save the Date</p>
            <p class="text-lg md:text-xl tracking-[0.8em] font-light mb-2">家在毅綺</p>
            <p class="font-serif-en text-sm md:text-base tracking-[0.4em] opacity-80">2026.09.12</p>
        </div>
    </header>

    <section id="about" class="py-20 px-6 bg-[#faf9f6]">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-3xl font-serif-en italic mb-12 text-[#d4a373]">The Countdown</h2>
            
            <div id="timer" class="flex justify-center items-center mb-10">
                <div class="flex flex-col items-center">
                    <div class="timer-card mb-2"><span id="days" class="text-4xl font-serif-en">00</span></div>
                    <span class="text-[10px] tracking-widest text-gray-400">DAYS</span>
                </div>
                <div class="timer-divider"></div>
                <div class="flex flex-col items-center">
                    <div class="timer-card mb-2"><span id="hours" class="text-4xl font-serif-en">00</span></div>
                    <span class="text-[10px] tracking-widest text-gray-400">HOURS</span>
                </div>
                <div class="timer-divider"></div>
                <div class="flex flex-col items-center">
                    <div class="timer-card mb-2"><span id="minutes" class="text-4xl font-serif-en">00</span></div>
                    <span class="text-[10px] tracking-widest text-gray-400">MINS</span>
                </div>
                <div class="timer-divider"></div>
                <div class="flex flex-col items-center">
                    <div class="timer-card mb-2"><span id="seconds" class="text-4xl font-serif-en">00</span></div>
                    <span class="text-[10px] tracking-widest text-gray-400">SECS</span>
                </div>
            </div>

            <div class="mt-12">
                <a href="https://lin.ee/r1W84Cb" class="btn-green">
                    加入婚禮 LINE 好友
                </a>
                <p class="text-[10px] text-gray-500 mt-4 tracking-[0.05em]">歡迎大家加入，可查詢婚宴資訊</p>
            </div>
        </div>
    </section>

    <section id="details" class="py-20 px-6 bg-white">
        <div class="max-w-2xl mx-auto">
            <div class="v-card p-10 space-y-8">
                <div class="text-center mb-12">
                    <h2 class="text-2xl font-bold tracking-widest mb-2">婚宴資訊</h2>
                </div>
                <div class="space-y-6">
                    <div class="flex items-start">
                        <div class="w-24 shrink-0 text-[#d4a373] font-bold">日期</div>
                        <div><p class="font-bold">2026年09月12日</p><p class="text-sm text-gray-500 mt-1">星期六</p></div>
                    </div>
                    <div class="flex items-start">
                        <div class="w-24 shrink-0 text-[#d4a373] font-bold">時間</div>
                        <div><p class="font-bold">11:00 入席 ｜ 12:00 開席</p><p class="text-xs text-gray-400 mt-2 leading-relaxed">現場備有迎賓雞尾酒及似顏繪，數量有限</p></div>
                    </div>
                    <div class="flex items-start">
                        <div class="w-24 shrink-0 text-[#d4a373] font-bold">地點</div>
                        <div><p class="font-bold">台中 蘭克斯特</p><p class="text-xs text-gray-400 mt-2 leading-relaxed">台中市北屯區崇德路二段347號</p></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="rsvp" class="py-24 px-6 bg-[#f4f1ea]">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-bold tracking-[0.2em] mb-2 text-[#4a4a4a]">出席回函</h2>
            </div>
            <form id="weddingForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdWs7JOsYk26RwVofrPF9RsRL-5_kYPuOGMJEFIkUOK_jmZ-Q/formResponse" method="POST" target="hidden_iframe" onsubmit="return handleSubmit()">
                <div class="space-y-10">
                    <div>
                        <label class="block mb-1 text-sm text-[#d4a373]">賓客姓名</label>
                        <input type="text" name="entry.2005620554" class="form-input" required>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm text-[#d4a373]">參加人數</label>
                        <select id="guestCount" name="entry.1045781291" class="form-input" required>
                            <option value="0">不克出席，寄予祝福</option>
                            <option value="1">1位</option>
                            <option value="2">2位</option>
                            <option value="3">3位</option>
                            <option value="4">4位</option>
                            <option value="5">5位</option>
                        </select>
                    </div>
                    <div id="conditionalSection" class="hidden-section space-y-10">
                        <div>
                            <label class="block mb-1 text-sm text-[#d4a373]">葷食人數</label>
                            <select name="entry.meat_count" class="form-input">
                                <option value="1">1位</option>
                                <option value="2">2位</option>
                                <option value="3">3位</option>
                                <option value="4">4位</option>
                                <option value="5">5位</option>
                            </select>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm text-[#d4a373]">素食人數</label>
                            <select id="vegCount" name="entry.veg_count" class="form-input" onchange="toggleVegName()">
                                <option value="0">0位</option>
                                <option value="1">1位</option>
                                <option value="2">2位</option>
                                <option value="3">3位</option>
                                <option value="4">4位</option>
                                <option value="5">5位</option>
                            </select>
                        </div>
                        <div id="vegNameSection" class="hidden-section">
                            <label class="block mb-1 text-sm text-[#d4a373]">素食賓客姓名</label>
                            <input type="text" name="entry.veg_names" class="form-input">
                        </div>
                        <div>
                            <label class="block mb-1 text-sm text-[#d4a373]">是否需要兒童座椅</label>
                            <select name="entry.child_seat" class="form-input">
                                <option value="0">不需要</option>
                                <option value="1">1張</option>
                                <option value="2">2張</option>
                            </select>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm text-[#d4a373]">請填寫者輸入同行賓客的姓名，方便您查詢當天桌次</label>
                            <input type="text" name="entry.guest_names" class="form-input">
                        </div>
                    </div>
                    
                    <div class="text-center pt-8">
                        <!-- 文字移至按鈕上方 -->
                        <div class="text-center text-sm text-gray-500 py-4 mb-4">
                            謝謝您抽空填寫，期待與您婚禮見♡
                        </div>
                        <button type="submit" class="btn-green">送出回函</button>
                    </div>
                </div>
            </form>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.submitted) { showSuccess(); }"></iframe>
        </div>
    </section>

    <footer class="py-10 text-center bg-white border-t border-gray-100">
        <p class="text-sm tracking-[0.2em] text-[#d4a373]">柏毅&儷綺</p>
    </footer>

    <div id="successModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[2000] px-6">
        <div class="bg-white p-10 rounded-2xl text-center max-w-sm w-full">
            <h3 class="text-xl font-bold mb-2">已成功收到您的回函</h3>
            <button onclick="closeModal()" class="text-[#d4a373] font-bold">關閉</button>
        </div>
    </div>

    <script>
        window.submitted = false;
        const weddingDate = new Date("Sep 12, 2026 11:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
        document.getElementById('guestCount').addEventListener('change', function() {
            document.getElementById('conditionalSection').classList.toggle('show-section', parseInt(this.value) > 0);
        });
        function toggleVegName() {
            document.getElementById('vegNameSection').classList.toggle('show-section', document.getElementById('vegCount').value !== '0');
        }
        function handleSubmit() { window.submitted = true; return true; }
        function showSuccess() { document.getElementById('successModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('successModal').classList.add('hidden'); location.reload(); }
    </script>
</body>
</html>
